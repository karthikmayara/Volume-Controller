<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Volume Controller Settings</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <h1>Volume Controller</h1>

      <section>
        <h2>Volume mode</h2>
        <label><input type="radio" name="volumeMode" value="global" /> Global (consistent across tabs)</label>
        <label><input type="radio" name="volumeMode" value="per-platform" /> Per platform (YouTube / YTM / Spotify)</label>
      </section>

      <section>
        <label class="row">
          <span>Enable owner debug logs</span>
          <input id="debugOwner" type="checkbox" />
        </label>
      </section>

      <p id="status" aria-live="polite"></p>
      <p class="help">Tip: Use global mode to keep volume consistent when switching media tabs.</p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
